<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h3 class="mb-0">Add New Task</h3>
    </div>
    <div class="card-body">
      <form (ngSubmit)="onSubmit()">
        
        <!-- Task Title -->
        <div class="mb-3">
          <label class="form-label fw-bold">Task Title</label>
          <input type="text" name="title" [(ngModel)]="task.title" class="form-control" required>
        </div>

        <!-- Task Description -->
        <div class="mb-3">
          <label class="form-label fw-bold">Description</label>
          <textarea name="description" [(ngModel)]="task.description" class="form-control" rows="3"></textarea>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Due Date</label>
            <input type="date" name="dueDate" [(ngModel)]="task.dueDate" class="form-control" required>
          </div>

          <!-- Priority -->
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Priority</label>
            <select name="priority" [(ngModel)]="task.priority" class="form-select">
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
          </div>
        </div>

        <!-- Submit Button -->
        <div class="mt-3">
          <button type="submit" class="btn btn-success px-4 me-2">Save Task</button>
          <button type="button" class="btn btn-secondary px-4" (click)="router.navigate(['/tasks'])">Cancel</button>
        </div>

      </form>
    </div>
  </div>
</div>
