<div class="container mt-5" *ngIf="task; else noTask">
  <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
    
    <!-- Header: Mint/Seafoam Theme -->
    <div class="card-header border-0 py-3" style="background-color: #e3fef7;">
      <h3 class="mb-0 fw-bold" style="color: #2d6a4f;">🌿 Edit Task Details</h3>
    </div>
    
    <div class="card-body p-4 bg-white">
      <form #taskForm="ngForm">
        <div class="row g-4">
          <!-- ID Field (Readonly as per requirement) -->
          <div class="col-md-2">
            <label class="form-label fw-bold text-muted small text-uppercase">ID</label>
            <input type="text" [value]="task.id" class="form-control bg-light border-0" readonly>
          </div>

          <!-- Title Field -->
          <div class="col-md-10">
            <label class="form-label fw-bold text-muted small text-uppercase">Task Title</label>
            <input type="text" name="title" [(ngModel)]="task.title" 
                   class="form-control border-success-subtle" required>
          </div>

          <!-- Description Field -->
          <div class="col-12">
            <label class="form-label fw-bold text-muted small text-uppercase">Description</label>
            <textarea name="description" [(ngModel)]="task.description" 
                      class="form-control border-success-subtle" rows="3"></textarea>
          </div>

          <!-- Due Date -->
          <div class="col-md-4">
            <label class="form-label fw-bold text-muted small text-uppercase">Due Date</label>
            <input type="date" name="dueDate" [(ngModel)]="task.dueDate" 
                   class="form-control border-success-subtle">
          </div>

          <!-- Status Dropdown (Union Type) -->
          <div class="col-md-4">
            <label class="form-label fw-bold text-muted small text-uppercase">Status</label>
            <select name="status" [(ngModel)]="task.status" class="form-select border-success-subtle">
              <option value="Pending">Pending</option>
              <option value="In Progress">In Progress</option>
              <option value="Completed">Completed</option>
            </select>
          </div>

          <!-- Priority Dropdown (Union Type) -->
          <div class="col-md-4">
            <label class="form-label fw-bold text-muted small text-uppercase">Priority Level</label>
            <select name="priority" [(ngModel)]="task.priority" class="form-select border-success-subtle">
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
          </div>
        </div>

        <!-- Action Buttons: Mint Theme -->
        <div class="mt-5 border-top pt-4 d-flex gap-2">
          <button type="button" class="btn px-4 fw-bold shadow-sm text-white" 
                  style="background-color: #0fbda2; border: none;"
                  (click)="onSave()">
            Save Changes
          </button>
          <button type="button" class="btn btn-outline-success px-4" 
                  style="border-color: #0fbda2; color: #2d6a4f;"
                  (click)="onBack()">
            Back to List
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Template if Task ID is not found -->
<ng-template #noTask>
  <div class="container mt-5 text-center">
    <div class="alert border-0 shadow-sm rounded-4 py-5" style="background-color: #fdf2f2;">
      <h4 class="fw-bold text-danger">Task Not Found</h4>
      <p class="text-muted">The task with the specified ID does not exist in our system.</p>
      <button class="btn btn-danger px-5 mt-3 rounded-pill" (click)="onBack()">
        Go Back to List
      </button>
    </div>
  </div>
</ng-template>
